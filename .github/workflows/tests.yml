name: Tests

on: [push, pull_request]

jobs:
  lint:
    name: Lint & build
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-lint-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm run lint

  test:
    name: Tests (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ github.workflow }}-test-${{ matrix.node }}-${{ github.ref }}
      cancel-in-progress: true
    strategy:
      matrix:
        node: ['20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run test
